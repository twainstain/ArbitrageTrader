version: "3.8"

services:
  bot:
    image: ${ECR_REGISTRY:-local}/arb-trader:${IMAGE_TAG:-latest}
    build: .
    container_name: arb-bot
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
    depends_on:
      - loki
    networks:
      - arb-net

  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: arb-prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - arb-net

  grafana:
    image: grafana/grafana:10.4.2
    container_name: arb-grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASS:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=%(protocol)s://%(domain)s/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - loki
    networks:
      - arb-net

  loki:
    image: grafana/loki:2.9.4
    container_name: arb-loki
    restart: unless-stopped
    volumes:
      - ./monitoring/loki.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - arb-net

  promtail:
    image: grafana/promtail:2.9.4
    container_name: arb-promtail
    restart: unless-stopped
    volumes:
      - ./monitoring/promtail.yml:/etc/promtail/config.yml:ro
      - ./logs:/var/log/arb-bot:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    networks:
      - arb-net

  nginx:
    image: nginx:alpine
    container_name: arb-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./monitoring/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - bot
      - grafana
    networks:
      - arb-net

volumes:
  prometheus-data:
  grafana-data:
  loki-data:

networks:
  arb-net:
    driver: bridge
